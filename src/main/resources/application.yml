spring:
  application:
    name: slot-auth-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/slot_auth}
    username: ${DB_USERNAME:slotauth}
    password: ${DB_PASSWORD:slotauth}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

auth:
  jwt:
    private-key-pem: ${JWT_PRIVATE_KEY_PEM:}
    public-key-pem: ${JWT_PUBLIC_KEY_PEM:}
    player-session-ttl-seconds: ${PLAYER_SESSION_TTL_SECONDS:3600}
    employee-token-ttl-seconds: ${EMPLOYEE_TOKEN_TTL_SECONDS:28800}

logging:
  level:
    root: INFO
    com.slotcentral.auth: DEBUG
